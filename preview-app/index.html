<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>亲密空间预览</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;margin:0;color:#ecf3ff}
    .app{max-width:760px;margin:0 auto;min-height:100vh;padding:18px}
    .card{background:linear-gradient(135deg,rgba(45,64,140,.55),rgba(19,28,67,.72));border:1px solid rgba(123,208,255,.28);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 10px 26px rgba(5,11,32,.45)}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    button{border:0;border-radius:10px;padding:10px 14px;cursor:pointer}
    .primary{background:linear-gradient(135deg,#00d4ff,#4f7bff 45%,#8d4bff);color:#f7feff}
    .ghost{background:linear-gradient(135deg,#5f72d6,#4d4ed1);color:#e8f4ff}
    .danger{background:#ef4444;color:#fff}
    input,select{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;margin-top:8px;box-sizing:border-box}
    .muted{color:#a7b7dd;font-size:13px}
    .tag{display:inline-block;background:rgba(0,212,255,.18);color:#b8f4ff;padding:2px 8px;border-radius:999px;font-size:12px}
    .list-item{padding:10px 0;border-top:1px solid #eef2f7}
    .modal-wrap{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100}
    .modal{width:min(760px,100%);background:#fff;border-radius:18px 18px 0 0;padding:16px 16px 26px}
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <script type="module">
    const KEY='mystwood_preview_state_v2';
    const defaultState={space:null,categories:[],tasks:[],score:50,activeModal:''};
    const read=()=>JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(defaultState);
    const write=s=>localStorage.setItem(KEY,JSON.stringify(s));
    const theme=score=>score<40?['霓虹冷调','#121a3d']:score<80?['跃迁暖调','#3e54c7']:['共振高能','#00d3ff'];

    function settle(s){
      const now=Date.now();
      s.tasks=s.tasks.map(t=>t.status==='todo'&&t.deadline&&now>t.deadline?{...t,status:'overdue'}:t);
      const c=s.tasks.filter(t=>t.status==='completed').length;
      const o=s.tasks.filter(t=>t.status==='overdue').length;
      s.score=Math.max(0,Math.min(100,50+c*6-o*7));
      return s;
    }

    function modalContent(s){
      if(s.activeModal==='createSpace') return `
        <div class='modal-wrap'><div class='modal'>
          <h3>创建空间</h3>
          <div class='muted'>创建后分享邀请码给 TA，同意后生效。</div>
          <input id='spaceName' placeholder='例如：我们的小宇宙'/>
          <div class='row' style='margin-top:10px'>
            <button class='primary' id='doCreateSpace'>确认创建</button>
            <button class='ghost' id='closeModal'>取消</button>
          </div>
        </div></div>`
      if(s.activeModal==='createCategory') return `
        <div class='modal-wrap'><div class='modal'>
          <h3>创建共同事项类</h3>
          <input id='catName' placeholder='如：运动'/>
          <input id='catRule' placeholder='规则，如：完成+10，逾期-5'/>
          <div class='row' style='margin-top:10px'>
            <button class='primary' id='doCreateCat'>发起同意</button>
            <button class='ghost' id='closeModal'>取消</button>
          </div>
        </div></div>`
      if(s.activeModal==='createTask') return `
        <div class='modal-wrap'><div class='modal'>
          <h3>创建任务</h3>
          <select id='taskCat'><option value=''>请选择生效类</option>${s.categories.filter(c=>c.status==='active').map(c=>`<option value='${c.id}'>${c.name}</option>`).join('')}</select>
          <input id='taskTitle' placeholder='任务标题'/>
          <input id='taskDeadline' type='date'/>
          <div class='row' style='margin-top:10px'>
            <button class='primary' id='doCreateTask'>确认创建</button>
            <button class='ghost' id='closeModal'>取消</button>
          </div>
        </div></div>`
      if(s.activeModal==='memories') return `
        <div class='modal-wrap'><div class='modal'>
          <h3>回忆归档</h3>
          ${(s.tasks.filter(t=>t.status!=='todo').sort((a,b)=>b.createdAt-a.createdAt).map(m=>`<div class='list-item'><b>${m.title}</b><div class='muted'>${m.status==='completed'?'已完成':'逾期扣分'}</div></div>`).join('')) || '<div class="muted">暂无回忆</div>'}
          <div class='row' style='margin-top:10px'><button class='ghost' id='closeModal'>关闭</button></div>
        </div></div>`
      return ''
    }

    function render(){
      let s=settle(read());write(s);
      const [themeName,bg]=theme(s.score);
      document.body.style.background=`radial-gradient(circle at 20% 20%, #1b2455 0%, #0a0f1f 46%, #05070f 100%), ${bg}`;
      const todos=s.tasks.filter(t=>t.status==='todo');
      const app=document.querySelector('#app');

      app.innerHTML=`
        <div class='card'>
          <h2 style='margin:0 0 8px'>亲密空间</h2>
          <div class='muted'>当前主题：<span class='tag'>${themeName}</span>（隐藏分映射）</div>
        </div>

        ${!s.space ? `
          <div class='card'>
            <h3 style='margin:0 0 8px'>欢迎来到亲密空间</h3>
            <div class='muted'>先创建空间，再邀请 TA 同意加入。</div>
            <div class='row' style='margin-top:10px'><button class='primary' id='openCreateSpace'>创建空间</button></div>
          </div>
        ` : `
          <div class='card'>
            <h3 style='margin:0'>${s.space.name}</h3>
            <div class='muted' style='margin-top:6px'>状态：${s.space.status==='active'?'已激活':'待同意'} ｜ 邀请码：${s.space.inviteToken}</div>
            <div class='row' style='margin-top:10px'>
              ${s.space.status!=='active' ? `<button class='primary' id='acceptInvite'>模拟 TA 同意</button>` : ''}
              <button class='danger' id='reset'>解绑并清空</button>
            </div>
          </div>

          ${s.space.status==='active' ? `
          <div class='card'>
            <h3 style='margin:0 0 10px'>空间操作</h3>
            <div class='row'>
              <button class='ghost' id='openCreateCategory'>创建类</button>
              <button class='ghost' id='openCreateTask'>创建任务</button>
              <button class='ghost' id='openMemories'>回忆归档</button>
            </div>
          </div>

          <div class='card'>
            <h3 style='margin:0 0 10px'>类列表</h3>
            ${(s.categories.map(c=>`<div class='list-item'><b>${c.name}</b><div class='muted'>${c.rule} · ${c.status}</div>${c.status==='pending'?`<div class='row' style='margin-top:8px'><button class='primary' data-approve='${c.id}'>同意</button><button class='danger' data-reject='${c.id}'>拒绝</button></div>`:''}</div>`).join('')) || '<div class="muted">暂无</div>'}
          </div>

          <div class='card'>
            <h3 style='margin:0 0 10px'>待办任务</h3>
            ${(todos.map(t=>`<div class='list-item'><b>${t.title}</b><div class='muted'>截止：${t.deadline?new Date(t.deadline).toLocaleString():'未设置'}</div><div class='row' style='margin-top:8px'><button class='primary' data-done='${t.id}'>标记完成</button></div></div>`).join('')) || '<div class="muted">暂无待办</div>'}
          </div>
          ` : ''}
        `}

        ${modalContent(s)}
      `;

      document.getElementById('openCreateSpace')?.addEventListener('click',()=>{s.activeModal='createSpace';write(s);render();});
      document.getElementById('openCreateCategory')?.addEventListener('click',()=>{s.activeModal='createCategory';write(s);render();});
      document.getElementById('openCreateTask')?.addEventListener('click',()=>{s.activeModal='createTask';write(s);render();});
      document.getElementById('openMemories')?.addEventListener('click',()=>{s.activeModal='memories';write(s);render();});

      document.getElementById('closeModal')?.addEventListener('click',()=>{s.activeModal='';write(s);render();});
      document.getElementById('doCreateSpace')?.addEventListener('click',()=>{
        const name=document.getElementById('spaceName').value.trim(); if(!name) return alert('请输入空间名');
        s.space={id:Date.now().toString(),name,status:'pending',inviteToken:Math.random().toString(36).slice(2,10)};
        s.activeModal=''; write(s); render();
      });
      document.getElementById('doCreateCat')?.addEventListener('click',()=>{
        const name=document.getElementById('catName').value.trim(); if(!name) return alert('请输入类名');
        const rule=document.getElementById('catRule').value.trim()||'完成+10，逾期-5';
        s.categories.unshift({id:'c'+Date.now(),name,rule,status:'pending'});
        s.activeModal=''; write(s); render();
      });
      document.getElementById('doCreateTask')?.addEventListener('click',()=>{
        const categoryId=document.getElementById('taskCat').value; if(!categoryId) return alert('请先选择生效类');
        const title=document.getElementById('taskTitle').value.trim(); if(!title) return alert('请输入任务标题');
        const date=document.getElementById('taskDeadline').value;
        s.tasks.unshift({id:'t'+Date.now(),title,categoryId,status:'todo',deadline:date?new Date(date+'T23:59:59').getTime():null,createdAt:Date.now()});
        s.activeModal=''; write(s); render();
      });

      document.getElementById('acceptInvite')?.addEventListener('click',()=>{s.space.status='active'; write(s); render();});
      document.getElementById('reset')?.addEventListener('click',()=>{localStorage.removeItem(KEY); render();});

      app.querySelectorAll('[data-approve]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.approve; s.categories=s.categories.map(c=>c.id===id?{...c,status:'active'}:c); write(s); render();}));
      app.querySelectorAll('[data-reject]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.reject; s.categories=s.categories.map(c=>c.id===id?{...c,status:'rejected'}:c); write(s); render();}));
      app.querySelectorAll('[data-done]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.done; s.tasks=s.tasks.map(t=>t.id===id?{...t,status:'completed'}:t); write(s); render();}));
    }

    render();
  </script>
</body>
</html>
